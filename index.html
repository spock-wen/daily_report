        function renderBriefs(briefs) {
            const grid = document.getElementById('briefs-grid');
            const emptyState = document.getElementById('empty-state');
            
            if (briefs.length === 0) {
                grid.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }
            
            grid.style.display = 'grid';
            emptyState.style.display = 'none';
            
            grid.innerHTML = briefs.map((brief, index) => `
                <div class="card" onclick="window.location.href='${brief.htmlFilename}'">
                    <div class="card-header">
                        <span class="card-date">${brief.date}</span>
                        ${index === 0 ? '<span class="card-badge latest">最新</span>' : ''}
                    </div>
                    <h3 class="card-title">${brief.title}</h3>
                    <div class="card-meta">
                        <div class="meta-item">
                            <span class="meta-icon">📊</span>
                            <span>${brief.projectCount} 个项目</span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-icon">🤖</span>
                            <span>${brief.aiCount} 个 AI 项目</span>
                        </div>
                    </div>
                    <div class="card-preview">
                        <h3>热门项目预览</h3>
                        <ul>
                            ${brief.topProjects.slice(0, 3).map(p => `<li>${p}</li>`).join('')}
                        </ul>
                    </div>
                    <div class="card-footer">
                        <span class="card-time">${brief.time}</span>
                        <span class="card-action">查看详情 →</span>
                    </div>
                </div>
            `).join('');
        }
        
        function sortBriefs(briefs, sortBy) {
            return [...briefs].sort((a, b) => {
                if (sortBy === 'date-desc') {
                    return new Date(b.date) - new Date(a.date);
                } else if (sortBy === 'date-asc') {
                    return new Date(a.date) - new Date(b.date);
                } else if (sortBy === 'ai-count-desc') {
                    return b.aiCount - a.aiCount;
                }
                return 0;
            });
        }
        
        function filterBriefs(briefs, query, filter) {
            let filtered = briefs;
            
            // 按搜索词过滤
            if (query) {
                const lowerQuery = query.toLowerCase();
                filtered = filtered.filter(brief => 
                    brief.title.toLowerCase().includes(lowerQuery) ||
                    brief.topProjects.some(p => p.toLowerCase().includes(lowerQuery))
                );
            }
            
            // 按AI项目过滤
            if (filter === 'ai-only') {
                filtered = filtered.filter(brief => brief.aiCount > 0);
            }
            
            return filtered;
        }
