name: Daily GitHub AI Brief

on:
  schedule:
    - cron: '0 23 * * *'     # 每日 7:00 (UTC 23:00)
    - cron: '0 22 * * 0'     # 每周一 6:00 (周日 UTC 22:00)
    - cron: '0 1 1 * *'     # 每月 1 日 9:00 (UTC 01:00)
  workflow_dispatch:
    inputs:
      trigger_type:
        description: '触发类型（手动触发时使用）'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly
          - monthly

jobs:
  generate-brief:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Identify trigger type
        id: trigger
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "${{ github.event.schedule }}" = "0 23 * * *" ]; then
              echo "TRIGGER_TYPE=daily" >> $GITHUB_ENV
              echo "TRIGGER_TYPE=daily (scheduled)"
            elif [ "${{ github.event.schedule }}" = "0 22 * * 0" ]; then
              echo "TRIGGER_TYPE=weekly" >> $GITHUB_ENV
              echo "TRIGGER_TYPE=weekly (scheduled)"
            elif [ "${{ github.event.schedule }}" = "0 1 1 * *" ]; then
              echo "TRIGGER_TYPE=monthly" >> $GITHUB_ENV
              echo "TRIGGER_TYPE=monthly (scheduled)"
            else
              echo "TRIGGER_TYPE=daily" >> $GITHUB_ENV
              echo "TRIGGER_TYPE=daily (fallback)"
            fi
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TRIGGER_TYPE=${{ inputs.trigger_type }}" >> $GITHUB_ENV
            echo "TRIGGER_TYPE=${{ inputs.trigger_type }} (manual)"
          else
            echo "TRIGGER_TYPE=daily" >> $GITHUB_ENV
            echo "TRIGGER_TYPE=daily (default)"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate brief
        env:
          TRIGGER_TYPE: ${{ env.TRIGGER_TYPE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_RECEIVE_ID: ${{ secrets.FEISHU_RECEIVE_ID }}
          FEISHU_RECEIVE_ID_TYPE: ${{ secrets.FEISHU_RECEIVE_ID_TYPE }}
        run: node src/crawler/crawl.js

      - name: Upload brief artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: brief-${{ env.TRIGGER_TYPE }}
          path: briefs/

      - name: Deploy to server
        if: ${{ env.TRIGGER_TYPE == 'daily' || env.TRIGGER_TYPE == 'weekly' || env.TRIGGER_TYPE == 'monthly' }}
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PATH: ${{ secrets.SERVER_PATH }}
        run: |
          # Check if required secrets are configured
          if [ -z "${{ secrets.SERVER_SSH_KEY }}" ]; then
            echo "::warning::SERVER_SSH_KEY is not configured. Deployment to server is skipped."
            echo "::notice::简报已生成并上传为 Artifact，但服务器部署已跳过。"
            echo "::notice::如需部署到服务器，请在 GitHub Secrets 中配置 SERVER_SSH_KEY、SERVER_IP、SERVER_USER、SERVER_PATH"
            exit 0
          fi
          
          if [ -z "$SERVER_IP" ]; then
            echo "::warning::SERVER_IP is not configured, skipping deployment"
            exit 0
          fi
          
          if [ -z "$SERVER_USER" ]; then
            echo "::warning::SERVER_USER is not configured, skipping deployment"
            exit 0
          fi
          
          if [ -z "$SERVER_PATH" ]; then
            echo "::warning::SERVER_PATH is not configured, skipping deployment"
            exit 0
          fi

          # Setup SSH
          echo "Setting up SSH..."
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$SERVER_IP" >> ~/.ssh/known_hosts 2>/dev/null

          # Test SSH connection
          echo "Testing SSH connection..."
          if ! ssh -o BatchMode=yes -o ConnectTimeout=10 "$SERVER_USER@$SERVER_IP" "echo 'SSH connection successful'"; then
            echo "::error::SSH connection failed. Please check your SSH key and server configuration."
            exit 1
          fi

          # Create remote directory structure
          echo "Creating remote directory structure..."
          ssh "$SERVER_USER@$SERVER_IP" "mkdir -p $SERVER_PATH/briefs/daily $SERVER_PATH/briefs/weekly $SERVER_PATH/briefs/monthly"

          # Deploy based on trigger type
          if [ "$TRIGGER_TYPE" = "daily" ]; then
            echo "Deploying daily brief to server..."
            # Find the latest daily data file
            DAILY_FILE=$(find briefs/daily -name "data-*.json" -type f | head -n 1)
            if [ -n "$DAILY_FILE" ]; then
              scp "$DAILY_FILE" "$SERVER_USER@$SERVER_IP:$SERVER_PATH/briefs/daily/"
              echo "Deployed: $DAILY_FILE -> $SERVER_PATH/briefs/daily/"
            else
              echo "::error::No daily data file found"
              exit 1
            fi
          elif [ "$TRIGGER_TYPE" = "weekly" ]; then
            echo "Deploying weekly brief to server..."
            # Find the latest weekly data file
            WEEKLY_FILE=$(find briefs/weekly -name "data-weekly-*.json" -type f | head -n 1)
            if [ -n "$WEEKLY_FILE" ]; then
              scp "$WEEKLY_FILE" "$SERVER_USER@$SERVER_IP:$SERVER_PATH/briefs/weekly/"
              echo "Deployed: $WEEKLY_FILE -> $SERVER_PATH/briefs/weekly/"
            else
              echo "::error::No weekly data file found"
              exit 1
            fi
          elif [ "$TRIGGER_TYPE" = "monthly" ]; then
            echo "Deploying monthly brief to server..."
            # Find the latest monthly data file
            MONTHLY_FILE=$(find briefs/monthly -name "data-monthly-*.json" -type f | head -n 1)
            if [ -n "$MONTHLY_FILE" ]; then
              scp "$MONTHLY_FILE" "$SERVER_USER@$SERVER_IP:$SERVER_PATH/briefs/monthly/"
              echo "Deployed: $MONTHLY_FILE -> $SERVER_PATH/briefs/monthly/"
            else
              echo "::error::No monthly data file found"
              exit 1
            fi
          fi
