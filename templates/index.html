<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub AI 项目每日简报</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: #1a2332;
            --bg-card-hover: #243045;
            --text-primary: #f0f4f8;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-primary: #3b82f6;
            --accent-secondary: #8b5cf6;
            --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            --border-color: #1e293b;
            --success: #10b981;
            --warning: #f59e0b;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            background-image: 
                radial-gradient(ellipse at top, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at bottom right, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
        }

        header {
            padding: 48px 0 32px;
            border-bottom: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--accent-gradient);
            opacity: 0.5;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: var(--accent-gradient);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: var(--shadow-glow);
        }

        .logo-text h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 28px;
            font-weight: 600;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-text p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 2px;
        }

        .stats {
            display: flex;
            gap: 32px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 24px;
            font-weight: 600;
            color: var(--accent-primary);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .search-box {
            flex: 1;
            max-width: 400px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            opacity: 0.5;
        }

        .sort-select {
            padding: 12px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .sort-select:hover {
            border-color: var(--accent-primary);
        }

        main {
            padding: 32px 0 64px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 24px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--accent-gradient);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-primary);
            box-shadow: var(--shadow-lg), var(--shadow-glow);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .card-date {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--text-secondary);
            background: var(--bg-secondary);
            padding: 6px 12px;
            border-radius: 6px;
        }

        .card-badge {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 500;
        }

        .card-badge.latest {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
        }

        .card-title {
            font-family: 'Outfit', sans-serif;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .card-meta {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .meta-icon {
            font-size: 14px;
        }

        .card-preview {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .card-preview h3 {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .card-preview ul {
            list-style: none;
            padding: 0;
        }

        .card-preview li {
            font-size: 13px;
            color: var(--text-secondary);
            padding: 4px 0;
            padding-left: 20px;
            position: relative;
            line-height: 1.5;
        }

        .card-preview li::before {
            content: '•';
            position: absolute;
            left: 8px;
            color: var(--accent-primary);
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }

        .card-time {
            font-size: 12px;
            color: var(--text-muted);
        }

        .card-action {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: var(--accent-primary);
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .card:hover .card-action {
            gap: 10px;
        }

        .empty-state {
            text-align: center;
            padding: 80px 24px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 24px;
            opacity: 0.5;
        }

        .empty-state h2 {
            font-size: 20px;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        footer {
            padding: 32px 0;
            border-top: 1px solid var(--border-color);
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                align-items: flex-start;
            }

            .stats {
                width: 100%;
                justify-content: flex-start;
            }

            .controls {
                flex-direction: column;
            }

            .search-box {
                max-width: 100%;
            }

            .grid {
                grid-template-columns: 1fr;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            animation: fadeInUp 0.5s ease backwards;
        }

        .card:nth-child(1) { animation-delay: 0.05s; }
        .card:nth-child(2) { animation-delay: 0.1s; }
        .card:nth-child(3) { animation-delay: 0.15s; }
        .card:nth-child(4) { animation-delay: 0.2s; }
        .card:nth-child(5) { animation-delay: 0.25s; }
        .card:nth-child(6) { animation-delay: 0.3s; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon">🚀</div>
                    <div class="logo-text">
                        <h1>GitHub AI 项目每日简报</h1>
                        <p>追踪技术前沿，发现优质项目</p>
                    </div>
                </div>
                <div class="stats">
                    <div class="stat">
                        <div class="stat-value" id="total-briefs">0</div>
                        <div class="stat-label">简报总数</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="total-projects">0</div>
                        <div class="stat-label">收录项目</div>
                    </div>
                </div>
            </div>
            <div class="controls">
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="搜索简报内容...">
                </div>
                <select class="sort-select" id="sort-select">
                    <option value="date-desc">最新优先</option>
                    <option value="date-asc">最早优先</option>
                    <option value="ai-count-desc">AI项目最多</option>
                </select>
                <select class="sort-select" id="filter-select">
                    <option value="all">全部简报</option>
                    <option value="ai-only">仅AI项目</option>
                </select>
            </div>
        </header>

        <main>
            <div class="grid" id="briefs-grid">
            </div>
            <div class="empty-state" id="empty-state" style="display: none;">
                <div class="empty-state-icon">📭</div>
                <h2>暂无简报</h2>
                <p>简报将由 GitHub Actions 自动生成</p>
            </div>
        </main>

        <footer>
            <p>由 GitHub Actions 自动生成 · 最后更新: <span id="last-update">-</span></p>
        </footer>
    </div>

    <script>
        const briefsData = {{BRIEFS_DATA}};
        
        function renderBriefs(briefs) {
            const grid = document.getElementById('briefs-grid');
            const emptyState = document.getElementById('empty-state');
            
            if (briefs.length === 0) {
                grid.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }
            
            grid.style.display = 'grid';
            emptyState.style.display = 'none';
            
            grid.innerHTML = briefs.map((brief, index) => `
                <div class="card" onclick="window.location.href='${brief.htmlFilename}'">
                    <div class="card-header">
                        <span class="card-date">${brief.date}</span>
                        ${index === 0 ? '<span class="card-badge latest">最新</span>' : ''}
                    </div>
                    <h3 class="card-title">${brief.title}</h3>
                    <div class="card-meta">
                        <div class="meta-item">
                            <span class="meta-icon">📊</span>
                            <span>${brief.projectCount} 个项目</span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-icon">🤖</span>
                            <span>${brief.aiCount} 个 AI 项目</span>
                        </div>
                    </div>
                    <div class="card-preview">
                        <h3>热门项目预览</h3>
                        <ul>
                            ${brief.topProjects.slice(0, 3).map(p => `<li>${p}</li>`).join('')}
                        </ul>
                    </div>
                    <div class="card-footer">
                        <span class="card-time">${brief.time}</span>
                        <span class="card-action">查看详情 →</span>
                    </div>
                </div>
            `).join('');
        }
        
        function sortBriefs(briefs, sortBy) {
            return [...briefs].sort((a, b) => {
                if (sortBy === 'date-desc') {
                    return new Date(b.date) - new Date(a.date);
                } else if (sortBy === 'date-asc') {
                    return new Date(a.date) - new Date(b.date);
                } else if (sortBy === 'ai-count-desc') {
                    return b.aiCount - a.aiCount;
                }
                return 0;
            });
        }
        
        function filterBriefs(briefs, query, filter) {
            let filtered = briefs;
            
            // 按搜索词过滤
            if (query) {
                const lowerQuery = query.toLowerCase();
                filtered = filtered.filter(brief => 
                    brief.title.toLowerCase().includes(lowerQuery) ||
                    brief.topProjects.some(p => p.toLowerCase().includes(lowerQuery))
                );
            }
            
            // 按AI项目过滤
            if (filter === 'ai-only') {
                filtered = filtered.filter(brief => brief.aiCount > 0);
            }
            
            return filtered;
        }
        
        function updateStats(briefs) {
            document.getElementById('total-briefs').textContent = briefs.length;
            const totalProjects = briefs.reduce((sum, b) => sum + b.projectCount, 0);
            document.getElementById('total-projects').textContent = totalProjects;
            if (briefs.length > 0) {
                document.getElementById('last-update').textContent = briefs[0].time;
            }
        }
        
        document.getElementById('search-input').addEventListener('input', (e) => {
            const query = e.target.value;
            const sortBy = document.getElementById('sort-select').value;
            const filter = document.getElementById('filter-select').value;
            const sorted = sortBriefs(briefsData, sortBy);
            const filtered = filterBriefs(sorted, query, filter);
            renderBriefs(filtered);
        });
        
        document.getElementById('sort-select').addEventListener('change', (e) => {
            const sortBy = e.target.value;
            const query = document.getElementById('search-input').value;
            const filter = document.getElementById('filter-select').value;
            const sorted = sortBriefs(briefsData, sortBy);
            const filtered = filterBriefs(sorted, query, filter);
            renderBriefs(filtered);
        });
        
        document.getElementById('filter-select').addEventListener('change', (e) => {
            const filter = e.target.value;
            const query = document.getElementById('search-input').value;
            const sortBy = document.getElementById('sort-select').value;
            const sorted = sortBriefs(briefsData, sortBy);
            const filtered = filterBriefs(sorted, query, filter);
            renderBriefs(filtered);
        });
        
        const initialBriefs = sortBriefs(briefsData, 'date-desc');
        renderBriefs(initialBriefs);
        updateStats(briefsData);
    </script>
</body>
</html>
