<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} - GitHub AI 项目每日简报</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: #1a2332;
            --bg-card-hover: #243045;
            --text-primary: #f0f4f8;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-primary: #3b82f6;
            --accent-secondary: #8b5cf6;
            --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            --border-color: #1e293b;
            --success: #10b981;
            --warning: #f59e0b;
            --code-bg: #0d1117;
            --table-border: #2d3748;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.7;
            min-height: 100vh;
            background-image: 
                radial-gradient(ellipse at top, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at bottom right, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 24px;
        }

        header {
            padding: 48px 0 32px;
            border-bottom: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--accent-gradient);
            opacity: 0.5;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            flex-wrap: wrap;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: var(--accent-gradient);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: var(--shadow-glow);
        }

        .logo-text h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 28px;
            font-weight: 600;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-text p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 2px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            border-color: var(--accent-primary);
            transform: translateX(-4px);
        }

        .meta-bar {
            display: flex;
            gap: 24px;
            padding: 24px 0;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .meta-icon {
            font-size: 16px;
        }

        .meta-value {
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-primary);
        }

        main {
            padding: 32px 0 64px;
        }

        .markdown-content {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            animation: fadeInUp 0.5s ease;
        }

        .markdown-content h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 24px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.3;
        }

        .markdown-content h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            font-weight: 600;
            margin: 40px 0 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .markdown-content h2::before {
            content: '';
            width: 4px;
            height: 24px;
            background: var(--accent-gradient);
            border-radius: 2px;
        }

        .markdown-content h3 {
            font-family: 'Outfit', sans-serif;
            font-size: 20px;
            font-weight: 600;
            margin: 32px 0 16px;
            color: var(--text-primary);
        }

        .markdown-content p {
            margin-bottom: 16px;
            color: var(--text-secondary);
        }

        .markdown-content a {
            color: var(--accent-primary);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .markdown-content a:hover {
            color: var(--accent-secondary);
            text-decoration: underline;
        }

        .markdown-content strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        .markdown-content ul,
        .markdown-content ol {
            margin-bottom: 20px;
            padding-left: 24px;
        }

        .markdown-content li {
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        .markdown-content li::marker {
            color: var(--accent-primary);
        }

        .markdown-content blockquote {
            margin: 20px 0;
            padding: 16px 20px;
            background: var(--bg-secondary);
            border-left: 4px solid var(--accent-primary);
            border-radius: 0 8px 8px 0;
            color: var(--text-secondary);
            font-style: italic;
        }

        .markdown-content code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            background: var(--bg-secondary);
            padding: 2px 8px;
            border-radius: 4px;
            color: var(--accent-primary);
        }

        .markdown-content pre {
            margin: 24px 0;
            padding: 20px;
            background: var(--code-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow-x: auto;
        }

        .markdown-content pre code {
            background: transparent;
            padding: 0;
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.6;
        }

        .markdown-content table {
            width: 100%;
            margin: 24px 0;
            border-collapse: collapse;
            font-size: 14px;
        }

        .markdown-content th,
        .markdown-content td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--table-border);
        }

        .markdown-content th {
            background: var(--bg-secondary);
            font-weight: 600;
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
        }

        .markdown-content tr:hover {
            background: var(--bg-card-hover);
        }

        .markdown-content hr {
            margin: 40px 0;
            border: none;
            height: 1px;
            background: var(--border-color);
        }

        .markdown-content .project-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            transition: all 0.3s ease;
        }

        .markdown-content .project-card:hover {
            border-color: var(--accent-primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .markdown-content .project-card a {
            font-size: 18px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
        }

        footer {
            padding: 32px 0;
            border-top: 1px solid var(--border-color);
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
        }

        .scroll-top {
            position: fixed;
            bottom: 32px;
            right: 32px;
            width: 48px;
            height: 48px;
            background: var(--accent-gradient);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 20px;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-glow);
        }

        .scroll-top.visible {
            opacity: 1;
            visibility: visible;
        }

        .scroll-top:hover {
            transform: translateY(-4px);
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                align-items: flex-start;
            }

            .back-btn {
                width: 100%;
                justify-content: center;
            }

            .markdown-content {
                padding: 24px;
            }

            .markdown-content h1 {
                font-size: 24px;
            }

            .markdown-content h2 {
                font-size: 20px;
            }

            .markdown-content h3 {
                font-size: 18px;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .copy-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-left: 12px;
        }

        .copy-btn:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        .copy-btn.copied {
            background: rgba(16, 185, 129, 0.15);
            border-color: var(--success);
            color: var(--success);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon">🚀</div>
                    <div class="logo-text">
                        <h1>GitHub AI 项目每日简报</h1>
                        <p>{{DATE}}</p>
                    </div>
                </div>
                <a href="/" class="back-btn">
                    <span>←</span>
                    <span>返回列表</span>
                </a>
            </div>
            <div class="meta-bar">
                <div class="meta-item">
                    <span class="meta-icon">📅</span>
                    <span class="meta-value">{{DATE}}</span>
                </div>
                <div class="meta-item">
                    <span class="meta-icon">⏰</span>
                    <span class="meta-value">{{TIME}}</span>
                </div>
                <div class="meta-item">
                    <span class="meta-icon">📊</span>
                    <span class="meta-value">{{PROJECT_COUNT}} 个项目</span>
                </div>
                <div class="meta-item">
                    <span class="meta-icon">🤖</span>
                    <span class="meta-value">{{AI_COUNT}} 个 AI 项目</span>
                </div>
            </div>
        </header>

        <main>
            <div class="markdown-content" id="markdown-content">
            </div>
        </main>

        <footer>
            <p>由 GitHub Actions 自动生成 · 最后更新: {{TIME}}</p>
        </footer>
    </div>

    <button class="scroll-top" id="scroll-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">↑</button>

    <script>
        const markdownContent = `{{MARKDOWN_CONTENT}}`;
        
        document.getElementById('markdown-content').innerHTML = marked.parse(markdownContent);
        
        const scrollTopBtn = document.getElementById('scroll-top');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 300) {
                scrollTopBtn.classList.add('visible');
            } else {
                scrollTopBtn.classList.remove('visible');
            }
        });
        
        document.querySelectorAll('a[href^="http"]').forEach(link => {
            link.setAttribute('target', '_blank');
            link.setAttribute('rel', 'noopener noreferrer');
        });
    </script>
</body>
</html>
